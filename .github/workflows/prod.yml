#
name: Deploy Nuxt site to prod server

on:
    push:
        branches: ['main']

concurrency:
    group: production-deploy
    cancel-in-progress: false

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: 💅 Checkout
              uses: actions/checkout@v4

            - name: 💚 Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
                  cache-dependency-path: ./package-lock.json

            - name: ❤️ Install deps
              run: npm ci

            - name: 🔨 Build Nuxt
              run: npm run build

            - name: 📦 Prepare artifact
              run: |
                  mkdir -p artifact
                  cp -rp .nuxt static artifact/
                  cp package.json package-lock.json artifact/
                  cp nuxt.config.js Dockerfile compose.yml artifact/

            - name: ⬆️ Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  include-hidden-files: true
                  name: app-build
                  path: artifact/

    deploy:
        runs-on: ubuntu-latest
        needs: build

        steps:
            - name: Download artifacts
              uses: actions/download-artifact@v4
              with:
                  name: app-build
                  path: ./artifact

            - name: ⬇️ Download artifacts
              uses: appleboy/scp-action@v0.1.7
              with:
                  host: ${{ secrets.SSH_HOST }}
                  port: ${{ secrets.SSH_PORT || 22 }}
                  username: ${{ secrets.SSH_USER || 'deploy' }}
                  password: ${{ secrets.SSH_PASS }}
                  source: 'artifact/*'
                  target: '/var/www/vfomin.com'
                  strip_components: 1
                  rm: true

            - name: 🔄️ Reinstall app
              uses: appleboy/ssh-action@v1.2.2
              with:
                  host: ${{ secrets.SSH_HOST }}
                  port: ${{ secrets.SSH_PORT || 22 }}
                  username: ${{ secrets.SSH_USER || 'deploy' }}
                  password: ${{ secrets.SSH_PASS }}
                  script: |
                      cd /var/www/vfomin.com
                      docker-compose down
                      docker-compose build --no-cache
                      docker-compose up -d --force-recreate
